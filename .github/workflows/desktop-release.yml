name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux-appimage temporarily disabled: produced AppImage starts but
          # MediaKit.ensureInitialized() fails because libmpv.so.2 + ALSA
          # plugins/configs are not bundled. Re-enable once
          # linux/packaging/appimage/make_config.yaml gains the required
          # `include:` block and a clean-container run is verified.
          - os: ubuntu-24.04
            target: linux
            jobs: linux-deb,linux-rpm
          - os: windows-latest
            target: windows
            jobs: windows-zip
          - os: macos-latest
            target: macos
            jobs: macos-dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable

      - name: Install Linux build deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libblkid-dev \
            libmpv-dev mpv \
            rpm patchelf

      - name: Install macOS packaging deps
        if: matrix.target == 'macos'
        run: npm install -g appdmg

      - run: flutter pub get

      - run: dart pub global activate fastforge

      - name: Ensure pub global bin on PATH (Unix)
        if: matrix.target != 'windows'
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Ensure pub global bin on PATH (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: echo "$env:LOCALAPPDATA\Pub\Cache\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - run: fastforge release --name stable --jobs ${{ matrix.jobs }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.deb
            dist/**/*.rpm
            dist/**/*.zip
            dist/**/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
