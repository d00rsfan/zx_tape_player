name: zx_tape_player
description: ZX Tape Player makes able uploading of TAP/TZX files to ZX Spectrum compatible computers.

publish_to: 'none'

version: 1.3.0+22

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_typeahead: ^5.2.0
  package_info_plus: ^9.0.0
  http: ^1.6.0
  easy_localization: ^3.0.8
  file_picker: ^10.3.10
  cached_network_image: ^3.4.1
  pull_to_refresh_flutter3: ^2.0.2
  carousel_slider: ^5.0.0
  just_audio: ^0.10.5
  flutter_spinkit: ^5.2.1
  rxdart: ^0.28.0
  crypto: ^3.0.7
  get_it: ^9.0.0
  url_launcher: ^6.3.2
  marquee_widget: ^1.2.0
  archive: ^4.0.9
  zx_tape_to_wav_x: ^1.0.0
  sound_mode: ^3.0.0
  shared_preferences: ^2.5.5
  internet_connection_checker: ^3.0.1
  wakelock_plus: ^1.2.8
  volume_controller: ^3.4.4
  share_plus: ^12.0.2
  permission_handler: ^12.0.1
  in_app_review: ^2.0.11

dependency_overrides:
  # Fork with AVAudioTimePitchAlgorithmVarispeed on iOS/macOS so playback
  # speed also scales pitch (tape-recorder semantics). Combined with an
  # explicit setPitch(speed) on Android, both platforms behave alike.
  # Pinned to a SHA for reproducible builds; revert once upstream merges.
  just_audio:
    git:
      url: https://github.com/d00rsfan/just_audio.git
      ref: 0c0cf436811ed196064380120b484efbbed71d91
      path: just_audio

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.5
  build_runner: ^2.4.14

flutter_icons:
  android: true
  ios: true
  image_path_ios: "assets/icons/launcher/ios.png"
  image_path_android: "assets/icons/launcher/android.png"
  adaptive_icon_foreground: "assets/icons/launcher/android-foreground.png"
  adaptive_icon_background: "assets/icons/launcher/android-background.png"

flutter_native_splash:
  color: "#546B7F"
  fullscreen: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/splash/logo.png
    - assets/images/splash/spool.png
    - assets/images/home/search-icon.png
    - assets/translations/
    - assets/sounds/empty.wav

  fonts:
    - family: ZxSpectrum
      fonts:
        - asset: assets/fonts/zx_spectrum-7.ttf
